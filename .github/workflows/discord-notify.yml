name: Discord Commit Notification
on:
  push:
    branches:
      - main
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "username": "GitHub",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "embeds": [{
              "title": "New Commit #${{ steps.sha.outputs.short }}",
              "url": "https://github.com/${{ github.repository }}/commit/${{ github.sha }}",
              "description": "A new commit was pushed to **${{ github.repository }}** on branch **${{ github.ref_name }}** — [view changes](https://github.com/${{ github.repository }}/commit/${{ github.sha }})",
              "color": 3447003,
              "fields": [
                {
                  "name": "Repository",
                  "value": "[${{ github.repository }}](https://github.com/${{ github.repository }})",
                  "inline": true
                },
                {
                  "name": "Branch",
                  "value": "`${{ github.ref_name }}`",
                  "inline": true
                },
                {
                  "name": "Author",
                  "value": "[${{ github.actor }}](https://github.com/${{ github.actor }})",
                  "inline": true
                },
                {
                  "name": "Commit Message",
                  "value": "${{ github.event.head_commit.message }}"
                },
                {
                  "name": "Commit",
                  "value": "[`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
                }
              ],
              "footer": {
                "text": "GitHub Actions",
                "icon_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
              },
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }]
          }' \
          $DISCORD_WEBHOOK